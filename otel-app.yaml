apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/bilalsafdar4989/opetelemtry 
    targetRevision: main
    path: apps/otel-demo

  destination:
    server: https://kubernetes.default.svc
    namespace: otel-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
